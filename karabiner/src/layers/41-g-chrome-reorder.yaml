  description: 'G+F+H: Chrome reorder tab left'
  from:
    key_code: h
    modifiers:
      optional:
      - any
  parameters:
    basic.to_if_held_down_threshold_milliseconds: 200
  to:
  - key_code: h
    modifiers:
    - left_command
    - left_control
  to_if_held_down:
  - key_code: h
    modifiers:
    - left_command
    - left_control
    - left_shift
  type: basic
