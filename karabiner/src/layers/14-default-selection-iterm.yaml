raw: true
manipulators:
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: s_is_held
    type: variable_if
    value: 1
  - bundle_identifiers:
    - ^com\.googlecode\.iterm2$
    type: frontmost_application_if
  - name: f_is_held
    type: variable_if
    value: 0
  from:
    key_code: semicolon
    modifiers:
      optional:
      - any
  to:
  - key_code: a
    modifiers:
    - option
  type: basic
