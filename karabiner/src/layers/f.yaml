    layer:
    - caps
    - f
    negative_conditions:
    - e
    - g
    - t
    to:
      shell: /usr/local/bin/hs -c "hs.eventtap.leftClick(hs.mouse.absolutePosition()); require('cursor_grid').flashClick()" 2>/dev/null &
