sections:
- negative_conditions: []
  manipulators:
  - conditions:
    - name: caps_lock_pressed
      type: variable_if
      value: 1
    from:
      key_code: non_us_backslash
      modifiers:
        optional:
        - any
    to:
    - set_variable:
        name: caps_lock_is_held
        value: 1
    to_after_key_up:
    - set_variable:
        name: caps_lock_is_held
        value: 0
    - set_variable:
        name: caps_lock_pressed
        value: 0
    - key_code: right_shift
    - key_code: right_shift
    - shell_command: /usr/local/bin/hs -c "require('key_suppress').stop(); require('ws_grid').resetAllKeys(); require('cursor_grid').modeReset()" &
    type: basic
  - from: non_us_backslash
    to:
    - set:
        caps_lock_is_held: 1
    - set:
        caps_lock_pressed: 1
    to_after_key_up:
    - set:
        caps_lock_is_held: 0
    - shell: /usr/local/bin/hs -c "require('key_suppress').stop(); require('ws_grid').resetAllKeys(); require('cursor_grid').modeReset()" &
    to_delayed_action:
      to_if_canceled:
      - set_variable:
          name: caps_lock_pressed
          value: 0
      to_if_invoked:
      - set_variable:
          name: caps_lock_pressed
          value: 0
    negative_conditions: []
- raw: true
  manipulators:
