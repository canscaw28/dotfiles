- raw: true
  manipulators:
  - description: a-physical-tracker
    from:
      key_code: a
      modifiers:
        optional:
        - any
    to:
    - set_variable:
        name: a_physical
        value: 1
    - key_code: a
    to_after_key_up:
    - set_variable:
        name: a_physical
        value: 0
    - set_variable:
        name: a_is_held
        value: 0
    - shell_command: /usr/local/bin/hs -c "require('key_suppress').stop('a')" &
    type: basic
  - description: s-physical-tracker
    from:
      key_code: s
      modifiers:
