negative_conditions: []
app: ^com\.googlecode\.iterm2$
manipulators:
- from: z
  from_modifiers:
  - command
  to:
  - hyphen
  - control+shift
- from: z
  from_modifiers:
  - command
  - shift
  to:
  - escape
  - - hyphen
    - shift
- from: a
  from_modifiers:
  - command
  to:
  - a
  - option
- from: c
  from_modifiers:
  - command
  to:
  - c
  - option
