layer:
- caps
- g
negative_conditions:
- a
- s
- d
- f
- r
- t
app: ^com\.google\.Chrome$
manipulators:
- from: h
  description: 'G+H: Chrome switch tab left'
  to:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown(-1)" &
  to_if_held_down: noop
  hold_threshold: 200
  to_after_key_up:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
- from: l
  description: 'G+L: Chrome switch tab right'
  to:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown(1)" &
  to_if_held_down: noop
  hold_threshold: 200
  to_after_key_up:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
- from: j
  description: 'G+J: Chrome focus window down'
  to:
  - j
  - left_command+left_control+left_option
- from: k
  description: 'G+K: Chrome focus window up'
  to:
  - k
  - left_command+left_control+left_option
- from: y
  description: 'G+Y: Chrome switch to first tab'
  to:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown('first')" &
  to_if_held_down: noop
  hold_threshold: 200
  to_after_key_up:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
- from: o
  description: 'G+O: Chrome switch to last tab'
  to:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown('last')" &
  to_if_held_down: noop
  hold_threshold: 200
  to_after_key_up:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
- from: u
  description: 'G+U: Chrome switch tab left 3'
  to:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown(-3)" &
  to_if_held_down: noop
  hold_threshold: 200
  to_after_key_up:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
- from: i
  description: 'G+I: Chrome switch tab right 3'
  to:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown(3)" &
  to_if_held_down: noop
  hold_threshold: 200
  to_after_key_up:
  - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
