layer:
- caps
- f
- d
- s
negative_conditions:
- g
- t
manipulators:
- from: h
  description: 'f-cursor-grid: F+D+S+h jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('h')" 2>/dev/null &
- from: j
  description: 'f-cursor-grid: F+D+S+j jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('j')" 2>/dev/null &
- from: k
  description: 'f-cursor-grid: F+D+S+k jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('k')" 2>/dev/null &
- from: l
  description: 'f-cursor-grid: F+D+S+l jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('l')" 2>/dev/null &
- from: slash
  description: 'f-cursor-grid: F+D+S+slash jump center'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('slash')" 2>/dev/null &
- from: y
  description: 'f-cursor-grid: F+D+S+y jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('y')" 2>/dev/null &
- from: o
  description: 'f-cursor-grid: F+D+S+o jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('o')" 2>/dev/null &
- from: n
  description: 'f-cursor-grid: F+D+S+n jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('n')" 2>/dev/null &
- from: period
  description: 'f-cursor-grid: F+D+S+period jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('period')" 2>/dev/null &
- from: u
  description: 'f-cursor-grid: F+D+S+u jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('u')" 2>/dev/null &
- from: i
  description: 'f-cursor-grid: F+D+S+i jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('i')" 2>/dev/null &
- from: m
  description: 'f-cursor-grid: F+D+S+m jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('m')" 2>/dev/null &
- from: comma
  description: 'f-cursor-grid: F+D+S+comma jump'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').jump('comma')" 2>/dev/null &
- from: semicolon
  description: 'f-cursor-grid: F+semicolon left click'
  layer:
  - caps
  - f
  negative_conditions:
  - e
  - g
  - t
  to:
    shell: /usr/local/bin/hs -c "hs.eventtap.leftClick(hs.mouse.absolutePosition()); require('cursor_grid').flashClick()" 2>/dev/null &
- from: quote
  description: 'f-cursor-grid: F+quote right click'
  layer:
  - caps
  - f
  negative_conditions:
  - e
  - g
  - t
  to:
    shell: /usr/local/bin/hs -c "hs.eventtap.rightClick(hs.mouse.absolutePosition()); require('cursor_grid').flashClick()" 2>/dev/null &
- from: p
  description: 'f-cursor-grid: F+P toggle grid'
  layer:
  - caps
  - f
  negative_conditions:
  - d
  - s
  - e
  - g
  - t
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').toggleGrid(8, 'move')" 2>/dev/null &
- from: p
  description: 'f-cursor-grid: F+D+P toggle grid'
  layer:
  - caps
  - f
  - d
  negative_conditions:
  - g
  - t
  - s
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').toggleGrid(8, 'move')" 2>/dev/null &
- from: p
  description: 'f-cursor-grid: F+S+P toggle grid'
  layer:
  - caps
  - f
  - s
  negative_conditions:
  - g
  - t
  - d
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').toggleGrid(32, 'move')" 2>/dev/null &
- from: p
  description: 'f-cursor-grid: F+D+S+P toggle grid'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').toggleGrid(8, 'jump')" 2>/dev/null &
