raw: true
manipulators:
- conditions:
  - name: a_physical
    type: variable_if
    value: 1
  description: caps-a-physical
  from:
    key_code: non_us_backslash
    modifiers:
      optional:
      - any
  to:
  - set_variable:
      name: caps_lock_is_held
      value: 1
  - set_variable:
      name: caps_lock_pressed
      value: 1
  - set_variable:
      name: a_is_held
      value: 1
  - shell_command: /usr/local/bin/hs -c "require('key_suppress').start('a')" &
  to_after_key_up:
  - set_variable:
      name: caps_lock_is_held
      value: 0
  - set_variable:
      name: caps_lock_pressed
      value: 0
  - shell_command: /usr/local/bin/hs -c "require('key_suppress').stop(); require('ws_grid').resetAllKeys(); require('cursor_grid').modeReset()" &
  to_delayed_action:
    to_if_canceled:
    - set_variable:
        name: caps_lock_pressed
        value: 0
    to_if_invoked:
    - set_variable:
        name: caps_lock_pressed
        value: 0
  type: basic
