layer:
- caps
- g
negative_conditions: []
app: ^com\.googlecode\.iterm2$
manipulators:
- from: h
  description: 'G+H: iTerm tmux pane left'
  to:
    shell: ~/.local/bin/g-focus-tmux.sh left &
- from: j
  description: 'G+J: iTerm tmux pane down'
  to:
    shell: ~/.local/bin/g-focus-tmux.sh down &
- from: k
  description: 'G+K: iTerm tmux pane up'
  to:
    shell: ~/.local/bin/g-focus-tmux.sh up &
- from: l
  description: 'G+L: iTerm tmux pane right'
  to:
    shell: ~/.local/bin/g-focus-tmux.sh right &
- from: y
  description: 'G+Y: iTerm tmux leftmost pane'
  to:
    shell: ~/.local/bin/g-focus-tmux-edge.sh left &
- from: o
  description: 'G+O: iTerm tmux rightmost pane'
  to:
    shell: ~/.local/bin/g-focus-tmux-edge.sh right &
