raw: true
manipulators:
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: g_is_held
    type: variable_if
    value: 1
  - bundle_identifiers:
    - ^com\.googlecode\.iterm2$
    type: frontmost_application_if
  description: 'G+H: iTerm tmux pane left'
  from:
    key_code: h
    modifiers:
      optional:
      - any
  to:
  - shell_command: ~/.local/bin/g-focus-tmux.sh left &
  type: basic
