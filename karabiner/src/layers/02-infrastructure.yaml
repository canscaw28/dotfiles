raw: true
manipulators:
- from:
    key_code: non_us_backslash
    modifiers:
      optional:
      - any
  to:
  - set_variable:
      name: caps_lock_is_held
      value: 1
  - set_variable:
      name: caps_lock_pressed
      value: 1
  to_after_key_up:
  - set_variable:
      name: caps_lock_is_held
      value: 0
  - shell_command: /usr/local/bin/hs -c "require('key_suppress').stop(); require('ws_grid').resetAllKeys(); require('cursor_grid').modeReset()" &
  to_delayed_action:
    to_if_canceled:
    - set_variable:
        name: caps_lock_pressed
        value: 0
    to_if_invoked:
    - set_variable:
        name: caps_lock_pressed
        value: 0
  type: basic
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  from:
    key_code: right_shift
    modifiers:
      optional:
      - any
  to:
  - key_code: caps_lock
    hold_down_milliseconds: 100
  type: basic
