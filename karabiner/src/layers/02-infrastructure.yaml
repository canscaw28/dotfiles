negative_conditions: []
manipulators:
- from: non_us_backslash
  to:
  - set:
      caps_lock_is_held: 1
  - set:
      caps_lock_pressed: 1
  to_after_key_up:
  - set:
      caps_lock_is_held: 0
  - shell: /usr/local/bin/hs -c "require('key_suppress').stop(); require('ws_grid').resetAllKeys(); require('cursor_grid').modeReset()" &
  to_delayed_action:
    to_if_canceled:
    - set_variable:
        name: caps_lock_pressed
        value: 0
    to_if_invoked:
    - set_variable:
        name: caps_lock_pressed
        value: 0
- from: right_shift
  layer:
  - caps
  to:
    key: caps_lock
    hold_down_milliseconds: 100
