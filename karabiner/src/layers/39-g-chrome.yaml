layer: [caps, g]
negative_conditions: [a, s, d, f, r, t]
app: "^com\\.google\\.Chrome$"

manipulators:
  - from: y
    description: "G+Y: Chrome switch to first tab"
    to:
      - shell: '/usr/local/bin/hs -c "require(''chrome_tabs'').onKeyDown(''first'')" &'
    to_if_held_down: noop
    hold_threshold: 200
    to_after_key_up:
      - shell: '/usr/local/bin/hs -c "require(''chrome_tabs'').onKeyUp()" &'

  - from: o
    description: "G+O: Chrome switch to last tab"
    to:
      - shell: '/usr/local/bin/hs -c "require(''chrome_tabs'').onKeyDown(''last'')" &'
    to_if_held_down: noop
    hold_threshold: 200
    to_after_key_up:
      - shell: '/usr/local/bin/hs -c "require(''chrome_tabs'').onKeyUp()" &'

  - from: u
    description: "G+U: Chrome switch tab left 3"
    to:
      - shell: '/usr/local/bin/hs -c "require(''chrome_tabs'').onKeyDown(-3)" &'
    to_if_held_down: noop
    hold_threshold: 200
    to_after_key_up:
      - shell: '/usr/local/bin/hs -c "require(''chrome_tabs'').onKeyUp()" &'

  - from: i
    description: "G+I: Chrome switch tab right 3"
    to:
      - shell: '/usr/local/bin/hs -c "require(''chrome_tabs'').onKeyDown(3)" &'
    to_if_held_down: noop
    hold_threshold: 200
    to_after_key_up:
      - shell: '/usr/local/bin/hs -c "require(''chrome_tabs'').onKeyUp()" &'
