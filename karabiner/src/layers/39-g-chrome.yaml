raw: true
manipulators:
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: a_is_held
    type: variable_if
    value: 0
  - name: s_is_held
    type: variable_if
    value: 0
  - name: d_is_held
    type: variable_if
    value: 0
  - name: f_is_held
    type: variable_if
    value: 0
  - name: r_is_held
    type: variable_if
    value: 0
  - name: t_is_held
    type: variable_if
    value: 0
  - name: g_is_held
    type: variable_if
    value: 1
  - bundle_identifiers:
    - ^com\.google\.Chrome$
    type: frontmost_application_if
  description: 'G+Y: Chrome switch to first tab'
  from:
    key_code: y
    modifiers:
      optional:
      - any
  parameters:
    basic.to_if_held_down_threshold_milliseconds: 200
  to:
  - shell_command: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown('first')" &
  to_if_held_down:
  - set_variable:
      name: guard_noop
      value: 0
  to_after_key_up:
  - shell_command: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
  type: basic
