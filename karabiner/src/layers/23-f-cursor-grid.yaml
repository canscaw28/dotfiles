layer:
- caps
- f
- d
negative_conditions:
- g
- t
- s
manipulators:
- from: h
  description: 'f-cursor-grid: F+D+h left 1'
  to:
    shell: /usr/local/bin/hs -c "require('cursor_grid').startMove('left', 1, 8)" 2>/dev/null &
  to_after_key_up:
    shell: /usr/local/bin/hs -c "require('cursor_grid').stopMove()" 2>/dev/null &
- from: j
  description: 'f-cursor-grid: F+D+j down 1'
