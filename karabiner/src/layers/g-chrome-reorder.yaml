layer:
- caps
- f
- g
negative_conditions:
- a
- s
- d
- r
- t
app: ^com\.google\.Chrome$
manipulators:
- from: h
  description: 'G+F+H: Chrome reorder tab left'
  hold_threshold: 200
  to:
  - h
  - left_command+left_control
  to_if_held_down:
  - h
  - left_command+left_control+left_shift
- from: l
