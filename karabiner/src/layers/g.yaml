    to: noop
  - from: n
    to: noop
  - from: m
    to: noop
  - from: comma
    to: noop
  - from: period
    description: 'G+period: close tab'
    to:
    - w
    - command
- layer:
  - caps
  - f
  - g
  negative_conditions:
  - a
  - s
  - d
  - r
  - t
  app: ^com\.google\.Chrome$
  manipulators:
  - from: h
    description: 'G+F+H: Chrome reorder tab left'
    hold_threshold: 200
    to:
    - h
    - left_command+left_control
    to_if_held_down:
    - h
    - left_command+left_control+left_shift
  - from: l
    description: 'G+F+L: Chrome reorder tab right'
    hold_threshold: 200
    to:
    - l
    - left_command+left_control
    to_if_held_down:
    - l
    - left_command+left_control+left_shift
  - from: y
    description: 'G+F+Y: Chrome reorder tab to first'
    hold_threshold: 200
    to:
    - y
    - left_command+left_control
    to_if_held_down:
    - y
    - left_command+left_control+left_shift
  - from: i
    description: 'G+F+I: Chrome reorder tab right 3'
    hold_threshold: 200
    to:
    - i
    - left_command+left_control
    to_if_held_down:
    - i
    - left_command+left_control+left_shift
  - from: u
    description: 'G+F+U: Chrome reorder tab left 3'
    hold_threshold: 200
    to:
    - u
    - left_command+left_control
    to_if_held_down:
    - u
    - left_command+left_control+left_shift
  - from: o
    description: 'G+F+O: Chrome reorder tab to last'
    hold_threshold: 200
    to:
    - o
    - left_command+left_control
    to_if_held_down:
    - o
    - left_command+left_control+left_shift
