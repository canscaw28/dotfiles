  - from: k
    description: 'G+K: focus window up'
    to:
    - k
    - left_command+left_control+left_option
  - from: l
    description: 'G+L: focus window right'
    to:
    - l
    - left_command+left_control+left_option
  - from: h
    to:
    - left_arrow
    - command+option
  - from: h
