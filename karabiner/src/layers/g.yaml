sections:
- layer:
  - caps
  - g
  - d
  negative_conditions: []
  app: ^com\.google\.Chrome$
  manipulators:
  - from: h
    description: 'G+D+H: Chrome move tab + focus left'
    to:
    - shell: /opt/homebrew/bin/aerospace split horizontal 2>/dev/null &
    - - left_arrow
      - left_control+left_option+left_shift
    - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
  - from: j
    description: 'G+D+J: Chrome move tab + focus down'
    to:
    - shell: /opt/homebrew/bin/aerospace split vertical 2>/dev/null &
    - - down_arrow
      - left_control+left_option+left_shift
    - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
  - from: k
    description: 'G+D+K: Chrome move tab + focus up'
    to:
    - shell: /opt/homebrew/bin/aerospace split vertical 2>/dev/null &
    - - up_arrow
      - left_control+left_option+left_shift
    - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
  - from: l
    description: 'G+D+L: Chrome move tab + focus right'
    to:
    - shell: /opt/homebrew/bin/aerospace split horizontal 2>/dev/null &
    - - right_arrow
      - left_control+left_option+left_shift
    - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
  - from: j
    description: 'G+F+J: Chrome move tab + focus down'
    layer:
    - caps
    - g
    - f
    negative_conditions:
    - d
    to:
    - shell: /opt/homebrew/bin/aerospace split vertical 2>/dev/null &
    - - down_arrow
      - left_control+left_option
    - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
  - from: k
    description: 'G+F+K: Chrome move tab + focus up'
    layer:
    - caps
    - g
    - f
    negative_conditions:
    - d
    to:
    - shell: /opt/homebrew/bin/aerospace split vertical 2>/dev/null &
    - - up_arrow
      - left_control+left_option
    - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
- layer:
  - caps
  - g
  negative_conditions: []
  app: ^com\.googlecode\.iterm2$
  manipulators:
  - from: h
    description: 'G+H: iTerm tmux pane left'
    to:
      shell: ~/.local/bin/g-focus-tmux.sh left &
  - from: j
    description: 'G+J: iTerm tmux pane down'
    to:
      shell: ~/.local/bin/g-focus-tmux.sh down &
  - from: k
    description: 'G+K: iTerm tmux pane up'
    to:
      shell: ~/.local/bin/g-focus-tmux.sh up &
  - from: l
    description: 'G+L: iTerm tmux pane right'
    to:
      shell: ~/.local/bin/g-focus-tmux.sh right &
  - from: y
    description: 'G+Y: iTerm tmux leftmost pane'
    to:
      shell: ~/.local/bin/g-focus-tmux-edge.sh left &
  - from: o
    description: 'G+O: iTerm tmux rightmost pane'
    to:
      shell: ~/.local/bin/g-focus-tmux-edge.sh right &
- layer:
  - caps
  - g
  negative_conditions:
  - a
  - s
  - d
  - f
  - r
  - t
  app: ^com\.google\.Chrome$
  manipulators:
  - from: h
    description: 'G+H: Chrome switch tab left'
    to:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown(-1)" &
    to_if_held_down: noop
    hold_threshold: 200
    to_after_key_up:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
  - from: l
    description: 'G+L: Chrome switch tab right'
    to:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown(1)" &
    to_if_held_down: noop
    hold_threshold: 200
    to_after_key_up:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
  - from: j
    description: 'G+J: Chrome focus window down'
    to:
    - j
    - left_command+left_control+left_option
  - from: k
    description: 'G+K: Chrome focus window up'
    to:
    - k
    - left_command+left_control+left_option
  - from: y
    description: 'G+Y: Chrome switch to first tab'
    to:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown('first')" &
    to_if_held_down: noop
    hold_threshold: 200
    to_after_key_up:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
  - from: o
    description: 'G+O: Chrome switch to last tab'
    to:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown('last')" &
    to_if_held_down: noop
    hold_threshold: 200
    to_after_key_up:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
  - from: u
    description: 'G+U: Chrome switch tab left 3'
    to:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown(-3)" &
    to_if_held_down: noop
    hold_threshold: 200
    to_after_key_up:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
  - from: i
    description: 'G+I: Chrome switch tab right 3'
    to:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyDown(3)" &
    to_if_held_down: noop
    hold_threshold: 200
    to_after_key_up:
    - shell: /usr/local/bin/hs -c "require('chrome_tabs').onKeyUp()" &
- layer:
  - caps
  - g
  negative_conditions:
