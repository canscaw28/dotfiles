  - from: p
    description: 'G+P: toggle Gemini side panel (Chrome)'
    app: ^com\.google\.Chrome$
    to:
    - [g, control]
  - from: open_bracket
    to:
    - open_bracket
    - command
  - from: close_bracket
    to:
    - close_bracket
    - command
