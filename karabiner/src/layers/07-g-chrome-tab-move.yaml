layer:
- caps
- g
- d
negative_conditions: []
app: ^com\.google\.Chrome$
manipulators:
- from: h
  description: 'G+D+H: Chrome move tab + focus left'
  to:
  - shell: /opt/homebrew/bin/aerospace split horizontal 2>/dev/null &
  - - left_arrow
    - left_control+left_option+left_shift
  - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
- from: j
  description: 'G+D+J: Chrome move tab + focus down'
  to:
  - shell: /opt/homebrew/bin/aerospace split vertical 2>/dev/null &
  - - down_arrow
    - left_control+left_option+left_shift
  - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
- from: k
  description: 'G+D+K: Chrome move tab + focus up'
  to:
  - shell: /opt/homebrew/bin/aerospace split vertical 2>/dev/null &
  - - up_arrow
    - left_control+left_option+left_shift
  - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
- from: l
  description: 'G+D+L: Chrome move tab + focus right'
  to:
  - shell: /opt/homebrew/bin/aerospace split horizontal 2>/dev/null &
  - - right_arrow
    - left_control+left_option+left_shift
  - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
- from: j
  description: 'G+F+J: Chrome move tab + focus down'
  layer:
  - caps
  - g
  - f
  negative_conditions:
  - d
  to:
  - shell: /opt/homebrew/bin/aerospace split vertical 2>/dev/null &
  - - down_arrow
    - left_control+left_option
  - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
- from: k
  description: 'G+F+K: Chrome move tab + focus up'
  layer:
  - caps
  - g
  - f
  negative_conditions:
  - d
  to:
  - shell: /opt/homebrew/bin/aerospace split vertical 2>/dev/null &
  - - up_arrow
    - left_control+left_option
  - shell: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
