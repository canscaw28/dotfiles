raw: true
manipulators:
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: g_is_held
    type: variable_if
    value: 1
  - name: d_is_held
    type: variable_if
    value: 1
  - bundle_identifiers:
    - ^com\.google\.Chrome$
    type: frontmost_application_if
  description: 'G+D+H: Chrome move tab + focus left'
  from:
    key_code: h
    modifiers:
      optional:
      - any
  to:
  - shell_command: /opt/homebrew/bin/aerospace split horizontal 2>/dev/null &
  - key_code: left_arrow
    modifiers:
    - left_control
    - left_option
    - left_shift
  - shell_command: /usr/local/bin/hs -c "require('focus_border').flash()" 2>/dev/null &
  type: basic
