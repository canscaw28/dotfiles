layer:
- caps
- d
negative_conditions:
- a
- s
- f
- r
- t
- g
manipulators:
- from: y
  hold_threshold: 500
  to:
  - delete_or_backspace
  - command
  to_if_held_down: f6
- from: u
  to:
  - delete_or_backspace
  - option
- from: i
  to:
  - delete_forward
  - option
- from: o
  hold_threshold: 500
  to:
  - - right_arrow
    - command+shift
  - delete_forward
  to_if_held_down: f5
- from: p
  to:
  - - right_arrow
    - command
  - - delete_or_backspace
    - command
- from: m
  to:
  - k
  - control
- from: comma
  to:
  - - up_arrow
    - option+shift
  - delete_or_backspace
