raw: true
manipulators:
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: a_is_held
    type: variable_if
    value: 1
  description: 'A+M: Toggle Sidecar'
  from:
    key_code: m
    modifiers:
      optional:
      - any
  to:
  - shell_command: /usr/bin/swift /Users/craig/dev/dotfiles/raycast/toggle-sidecar.swift &
  type: basic
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: a_is_held
    type: variable_if
    value: 1
  description: 'A+/: Clean Dock'
  from:
    key_code: slash
    modifiers:
      optional:
      - any
  to:
  - shell_command: /bin/bash /Users/craig/dev/dotfiles/scripts/clean-dock.sh &
  type: basic
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: a_is_held
    type: variable_if
    value: 1
  description: 'A+H: Switch to English (U.S.)'
  from:
    key_code: h
    modifiers:
      optional:
      - any
  to:
  - select_input_source:
      language: en
  type: basic
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: a_is_held
    type: variable_if
    value: 1
  description: 'A+N: Toggle Input Source'
  from:
    key_code: n
    modifiers:
      optional:
      - any
  to:
  - key_code: spacebar
    modifiers:
    - left_control
  type: basic
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: a_is_held
    type: variable_if
    value: 1
  description: 'A+U: Toggle Notification Center'
  from:
    key_code: u
    modifiers:
      optional:
      - any
  to:
  - shell_command: /usr/bin/osascript -e 'tell application "System Events" to tell application process "ControlCenter" to click (first menu bar item of menu bar 1 whose description is "Clock")' &
  type: basic
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: a_is_held
    type: variable_if
    value: 1
  description: 'A+I: Mission Control'
  from:
    key_code: i
    modifiers:
      optional:
      - any
  to:
  - key_code: mission_control
  type: basic
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: a_is_held
    type: variable_if
    value: 1
  description: 'A+O: Show Desktop'
  from:
    key_code: o
    modifiers:
      optional:
      - any
  to:
  - key_code: f11
    modifiers:
    - fn
  - shell_command: /usr/local/bin/hs -c "require('show_desktop').toggle()" &
  type: basic
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: a_is_held
    type: variable_if
    value: 1
  description: 'A+Y: Toggle Dock'
  from:
    key_code: y
    modifiers:
      optional:
      - any
  to:
  - shell_command: /usr/local/bin/hs -c "require('dock_peek').toggle()" &
  type: basic
