layer:
- caps
- f
- d
negative_conditions: []
manipulators:
- from: s
  description: 'F+D+S setter: switch to jump grid'
  to:
  - set:
      s_is_held: 1
  - shell: /usr/local/bin/hs -c "require('cursor_grid').modeKeyDown('s', 8, 'jump'); require('cursor_grid').flashIndicator()" 2>/dev/null &
  to_after_key_up:
  - set:
      s_is_held: 0
  - shell: /usr/local/bin/hs -c "require('cursor_grid').modeKeyUp('s')" &
- from: d
  description: 'F+S+D setter: switch to jump grid'
  layer:
  - caps
  - f
  - s
  to:
  - set:
      d_is_held: 1
  - shell: /usr/local/bin/hs -c "require('cursor_grid').modeKeyDown('d', 8, 'jump'); require('cursor_grid').flashIndicator()" 2>/dev/null &
  to_after_key_up:
  - set:
      d_is_held: 0
  - shell: /usr/local/bin/hs -c "require('cursor_grid').modeKeyUp('d')" &
