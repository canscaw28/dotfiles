raw: true
manipulators:
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: a_is_held
    type: variable_if
    value: 0
  - name: s_is_held
    type: variable_if
    value: 0
  - name: d_is_held
    type: variable_if
    value: 0
  - name: f_is_held
    type: variable_if
    value: 0
  - name: r_is_held
    type: variable_if
    value: 0
  - name: e_is_held
    type: variable_if
    value: 0
  - name: 3_is_held
    type: variable_if
    value: 1
  - name: 4_is_held
    type: variable_if
    value: 0
  - name: q_is_held
    type: variable_if
    value: 0
  - name: t_is_held
    type: variable_if
    value: 1
  - name: g_is_held
    type: variable_if
    value: 0
