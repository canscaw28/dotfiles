raw: true
manipulators:
- conditions:
  - name: caps_lock_is_held
    type: variable_if
    value: 1
  - name: f_is_held
    type: variable_if
    value: 1
  from:
    key_code: s
    modifiers:
      optional:
      - any
  to:
  - set_variable:
      name: s_is_held
      value: 1
  - shell_command: /usr/local/bin/hs -c "require('cursor_grid').modeKeyDown('s', 32, 'move'); require('cursor_grid').flashIndicator()" 2>/dev/null &
  to_after_key_up:
  - set_variable:
      name: s_is_held
      value: 0
  - shell_command: /usr/local/bin/hs -c "require('cursor_grid').modeKeyUp('s')" &
  type: basic
