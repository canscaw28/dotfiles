# espanso match file
# https://espanso.org/docs/matches/basics/

# Personal triggers (defined in personal.yml, gitignored):
#   ;pe    - personal email
#   ;ce    - company email
#   ;ge    - girlfriend email
#   ;pp    - personal phone
#   ;gp    - girlfriend phone
#   ;pa    - home address
#   ;lg    - GitHub link
#   ;ll    - LinkedIn link
#   ;li    - Instagram link
#   ;lx    - X/Twitter link
#   ;zoom  - Zoom meeting link

matches:
  # Dates
  - trigger: ";date"
    replace: "{{date}}"
    vars:
      - name: date
        type: date
        params:
          format: "%Y-%m-%d"

  - trigger: ";time"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "date +'%-l:%M%p' | tr '[:upper:]' '[:lower:]' | sed 's/^ //'"
          shell: bash

  - trigger: ";now"
    replace: "{{now}}"
    vars:
      - name: now
        type: date
        params:
          format: "%Y-%m-%d %H:%M"

  # Emoji
  - trigger: ";er"
    replace: "❌"
  - trigger: ";ey"
    replace: "⚠️"
  - trigger: ";eg"
    replace: "✅"
