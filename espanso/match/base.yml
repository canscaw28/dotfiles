# espanso match file
# https://espanso.org/docs/matches/basics/

# Personal triggers (defined in personal.yml, gitignored):
#   ;em    - personal email
#   ;cem   - work email
#   ;kem   - partner email
#   ;ph    - personal phone
#   ;kph   - partner phone
#   ;addr  - home address
#   ;gh    - GitHub profile
#   ;lin   - LinkedIn profile
#   ;inst  - Instagram profile
#   ;x     - X/Twitter profile
#   ;zoom  - Zoom meeting link

matches:
  # Dates
  - trigger: ";date"
    replace: "{{date}}"
    vars:
      - name: date
        type: date
        params:
          format: "%Y-%m-%d"

  - trigger: ";time"
    replace: "{{time}}"
    vars:
      - name: time
        type: date
        params:
          format: "%I:%M %p"

  - trigger: ";now"
    replace: "{{now}}"
    vars:
      - name: now
        type: date
        params:
          format: "%Y-%m-%d %H:%M"
