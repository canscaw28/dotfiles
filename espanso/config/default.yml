# espanso configuration
# https://espanso.org/docs/configuration/

# Delay between key events (ms) - lower = faster
key_delay: 0

# Double press Alt/Option to toggle espanso on/off
toggle_key: LEFT_ALT

# Clipboard backend works more reliably across terminals and GUI apps
backend: clipboard
pre_paste_delay: 10
restore_clipboard_delay: 10
paste_shortcut_event_delay: 1
